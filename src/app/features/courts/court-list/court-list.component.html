<div class="ui-grid-cards">
    @for(court of club?.Courts; track court){
      <app-ui-card [title]="court.name">
        <div card-media>
          @if(court.Images && court.Images.length > 0){
            <img [src]="court.Images[0].url" [alt]="court.name" />
          } @else {
            <img src="assets/files/club1.jpg" [alt]="court.name" />
          }
        </div>
        <p><strong>Tipo:</strong> {{ court.court_type }}</p>
        <p><strong>Pared:</strong> {{ court.wall_type }}</p>
        <div card-footer>
          <app-ui-button [fullWidth]="true" (click)="editCourt(court)">Editar</app-ui-button>
        </div>
      </app-ui-card>
    }
</div>
